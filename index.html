<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Obsidian Command | バーンレート・トラッカー</title>
  <meta name="description" content="映像制作PM向けリアルタイム・バーンレート・トラッカー。撮影現場の小口現金・領収書をリアルタイム管理。">
  <meta name="theme-color" content="#111318">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">

    <!-- ===== Header ===== -->
    <header class="app-header" id="app-header">
      <div class="app-header__brand">
        <div class="app-header__avatar">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#2e5bff,#00e3fd);display:flex;align-items:center;justify-content:center;font-family:var(--font-headline);font-weight:700;font-size:14px;color:white;">OC</div>
        </div>
        <h1 class="app-header__title">Obsidian Command</h1>
      </div>
      <div class="app-header__live" id="header-live-total">
        LIVE: ¥0
      </div>
    </header>

    <!-- ===== Main Content ===== -->
    <main class="app-main" id="app-main">

      <!-- Dashboard Screen -->
      <section class="screen active" id="screen-dashboard"></section>

      <!-- Receipts Screen -->
      <section class="screen" id="screen-receipts"></section>

      <!-- Staff Screen -->
      <section class="screen" id="screen-staff"></section>

      <!-- Settings Screen -->
      <section class="screen" id="screen-settings"></section>

    </main>

    <!-- ===== FAB (Quick Add) ===== -->
    <button class="fab" id="fab-quick-add" aria-label="クイック追加">
      <span class="material-symbols-outlined">add</span>
    </button>

    <!-- ===== Quick Add Modal ===== -->
    <div class="modal-overlay" id="modal-quick-add">
      <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <h2 class="text-headline">クイック支出入力</h2>
          <button class="btn--icon" id="modal-quick-close">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="space-y">
          <div class="form-group">
            <label class="form-label">
              <span class="material-symbols-outlined" style="font-size:14px;">payments</span>
              金額 (¥)
            </label>
            <input type="number" class="form-input form-input--lg" id="quick-amount" placeholder="0" inputmode="numeric">
          </div>
          <div class="form-group">
            <label class="form-label">店名・内容</label>
            <input type="text" class="form-input" id="quick-merchant" placeholder="例: カフェ、タクシー代">
          </div>
          <div class="form-group">
            <label class="form-label">カテゴリ</label>
            <div class="flex gap-sm" style="flex-wrap:wrap;" id="quick-categories">
              <button class="chip chip--success quick-cat active" data-cat="food">🍱 弁当・ケータリング</button>
              <button class="chip quick-cat" data-cat="transport">🚕 交通費</button>
              <button class="chip quick-cat" data-cat="equipment">📷 機材</button>
              <button class="chip quick-cat" data-cat="supplies">📦 備品</button>
              <button class="chip quick-cat" data-cat="venue">🏢 ロケ費</button>
              <button class="chip quick-cat" data-cat="other">📝 その他</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">スタッフ</label>
            <select class="form-input" id="quick-staff" style="font-size:0.875rem;">
              <option value="">-- PM直接 --</option>
            </select>
          </div>
          <button class="btn btn--primary mt-md" id="quick-submit">
            <span class="material-symbols-outlined" style="font-size:18px;">check_circle</span>
            記録する
          </button>
        </div>
      </div>
    </div>

    <!-- ===== Toast ===== -->
    <div class="toast" id="toast">
      <div class="flex items-center gap-sm">
        <span class="material-symbols-outlined color-secondary" id="toast-icon">check_circle</span>
        <span class="text-body" id="toast-message">保存しました</span>
      </div>
    </div>

    <!-- ===== Bottom Navigation ===== -->
    <nav class="nav-bottom" id="nav-bottom">
      <button class="nav-bottom__item active" data-screen="dashboard" id="nav-dashboard">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="nav-bottom__label">Dashboard</span>
      </button>
      <button class="nav-bottom__item" data-screen="receipts" id="nav-receipts">
        <span class="material-symbols-outlined">receipt_long</span>
        <span class="nav-bottom__label">Receipts</span>
      </button>
      <button class="nav-bottom__item" data-screen="staff" id="nav-staff">
        <span class="material-symbols-outlined">groups</span>
        <span class="nav-bottom__label">Staff</span>
      </button>
      <button class="nav-bottom__item" data-screen="settings" id="nav-settings">
        <span class="material-symbols-outlined">settings</span>
        <span class="nav-bottom__label">Settings</span>
      </button>
    </nav>

  </div>

  <!-- Scripts -->
  <script src="store.js"></script>
  <script src="screens/dashboard.js"></script>
  <script src="screens/receipts.js"></script>
  <script src="screens/staff.js"></script>
  <script src="screens/settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
